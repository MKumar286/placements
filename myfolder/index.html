<!DOCTYPE html>
<html>
<head>

<title>MGIT Placement Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
padding:15px;
overflow-x:hidden;
color:white;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
min-height:100vh;
}

/* Animated Background */

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Glow */

body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:rgba(0,198,255,0.15);
border-radius:50%;
top:-120px;
left:-120px;
filter:blur(100px);
animation:float1 10s infinite alternate;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:400px;
height:400px;
background:rgba(255,0,150,0.15);
border-radius:50%;
bottom:-100px;
right:-100px;
filter:blur(100px);
animation:float2 12s infinite alternate;
z-index:-1;
}

@keyframes float1{
from{transform:translateY(0px);}
to{transform:translateY(80px);}
}

@keyframes float2{
from{transform:translateX(0px);}
to{transform:translateX(-80px);}
}

/* HEADER */

.header-box{

background:linear-gradient(135deg,#000814,#001d3d,#003566);

padding:6px 10px;

border-radius:18px 18px 0 0;

margin-bottom:0;

box-shadow:0 6px 20px rgba(0,0,0,0.35);

border:1px solid rgba(255,255,255,0.15);

border-bottom:none;

text-align:center;

}


/* HEADINGS */

h1{

font-size:34px;

font-weight:bold;

background:linear-gradient(90deg,#ffffff,#ffe082,#ffffff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:8px;

letter-spacing:1px;

}

h3{

font-size:18px;
margin-top:2px;
font-weight:500;

background:linear-gradient(90deg,#b2ff59,#00e5ff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* STATS */

.stats{

margin:0;

font-weight:bold;

font-size:18px;

display:flex;

justify-content:center;

gap:25px;

flex-wrap:wrap;

padding:8px 12px;

background: linear-gradient(135deg, #064420, #0b6b35);

border-radius:0;

box-shadow:none;

border-left:1px solid rgba(255,255,255,0.15);

border-right:1px solid rgba(255,255,255,0.15);

color:white;

}

/* FILTER CONTAINER */
.filter-container {
display: flex;
flex-direction: column;
background:rgba(255,255,255,0.12);
padding:6px 8px;
border-radius:0 0 14px 14px;
backdrop-filter:blur(10px);
box-shadow:0 6px 20px rgba(0,0,0,0.25);
border:1px solid rgba(255,255,255,0.15);
border-top:none;
margin-bottom:6px;
gap: 6px;
}

/* FILTER SECTION */

.controls{

display:flex;

flex-wrap:nowrap;

gap:6px;

overflow-x:auto;

overflow-y:hidden;

scroll-behavior:smooth;

width: 100%;

}
/* FILTERS */

.controls input,
.controls select{

flex:0 0 auto;

width:170px;
min-width:170px;

height:30px;

padding:4px 8px;

font-size:12px;

border-radius:8px;

border:1px solid rgba(255,255,255,0.2);

outline:none;

background:rgba(255,255,255,0.92);

transition:0.3s;

color: #222;

}

/* FOCUS */

.controls input:focus,
.controls select:focus{

transform:scale(1.02);

box-shadow:0 0 10px rgba(255,255,255,0.5);

border:1px solid #00c6ff;

}

/* FILTER SCROLLBAR */

.controls::-webkit-scrollbar{
height:7px;
}

.controls::-webkit-scrollbar-track{
background:rgba(255,255,255,0.08);
border-radius:10px;
}

.controls::-webkit-scrollbar-thumb{
background:linear-gradient(90deg,#00c6ff,#0072ff);
border-radius:10px;
}

/* TABLE CONTAINER */

.table-container{

width:100%;

overflow-x:auto;

overflow-y:hidden;

border-radius:18px;

box-shadow:0 8px 25px rgba(0,0,0,0.35);

scroll-behavior:smooth;

background:rgba(255,255,255,0.05);

padding-bottom:6px;

}

/* TABLE SCROLLBAR */

.table-container::-webkit-scrollbar{

height:10px;

}

.table-container::-webkit-scrollbar-track{

background:rgba(255,255,255,0.08);

border-radius:10px;

}

.table-container::-webkit-scrollbar-thumb{

background:linear-gradient(90deg,#ff512f,#dd2476);

border-radius:10px;

}

.table-container::-webkit-scrollbar-thumb:hover{

background:linear-gradient(90deg,#00c6ff,#0072ff);

}

/* TABLE */

table{

border-collapse:collapse;

min-width:1600px;

width:max-content;

background:#ffffff;

color:#222;

border-radius:18px;

overflow:hidden;

}

/* TABLE HEADER */

th{

padding:8px 9px;

font-size:13px;

font-weight:bold;

text-align:center;

background:linear-gradient(135deg,#141e30,#243b55);

color:#ffffff;
line-height:1.3;
border:1px solid rgba(255,255,255,0.12);

white-space:nowrap;

}

/* TABLE DATA */

td{

padding:5px 9px;

font-size:12px;

font-weight:500;

text-align:center;

white-space:nowrap;

border:1px solid rgba(16,37,66,0.12);

}

/* ROW COLORS */

tr:nth-child(even){

background:#eef5ff;

}

tr:nth-child(odd){

background:#ffffff;

}

/* HOVER */

tbody tr:hover{

background:#ffd180;

transition:0.3s;

}

/* BUTTON */

.link-btn{

background:linear-gradient(135deg,#667eea,#764ba2);

color:white;

padding:3px 8px;

border-radius:6px;

text-decoration:none;

font-size:10px;

font-weight:bold;

line-height:1.2;

display:inline-block;

transition:0.3s;

box-shadow:0 3px 10px rgba(0,0,0,0.2);

}

.link-btn:hover{

transform:scale(1.06);

background:linear-gradient(135deg,#43cea2,#185a9d);

}

/* MOBILE */

@media(max-width:768px){

body{
padding:10px;
}

h1{
font-size:22px;
}

h3{
font-size:15px;
}

.stats{

font-size:13px;

gap:12px;

padding:6px;

}

.filter-container{
padding:5px;
gap:5px;
}

.controls input,
.controls select{

width:145px;
min-width:145px;

height:28px;
padding:3px 6px;
font-size:12px;

}

th{

font-size:11px;

padding:5px 6px;

}

td{

font-size:11px;

padding:4px 6px;

}

table{

min-width:1400px;

}

}

</style>

</head>

<body>

<div class="header-box">

<h1>Student Enrollment & Selection Journey</h1>

<h3>Academic Year 2026 - 2027</h3>

</div>

<div class="stats">

<div>
Total Offers :
<span id="totalOffers">0</span>
</div>

<div>
Total Placed Students :
<span id="placedStudents">0</span>
</div>

</div>

<div class="filter-container">
<div class="controls">

<input type="text" id="search" placeholder="Search student / roll / company">

<select id="branchFilter">
<option value="">All Branches</option>
</select>

<select id="appliedCompanyFilter">
<option value="">Applied Company</option>
</select>

<select id="tpoFilter">
<option value="">Shortlisted by TPO</option>
</select>

<select id="companyShortlistFilter">
<option value="">Shortlisted by Company</option>
</select>

<select id="paperTest1Filter">
<option value="">Pen & Paper Test -1 Status</option>
</select>

<select id="paperTest2Filter">
<option value="">Pen & Paper Test -2 Status</option>
</select>

</div>

<div class="controls">
<select id="gdFilter">
<option value="">GD Cleared?</option>
</select>

<select id="oa1Filter">
<option value="">Online Assessment-1 Cleared?</option>
</select>

<select id="oa2Filter">
<option value="">Online Assessment-2 Cleared?</option>
</select>

<select id="oa3Filter">
<option value="">Online Assessment-3 Cleared?</option>
</select>

<select id="tech1Filter">
<option value="">Technical Round-1 Cleared?</option>
</select>

<select id="tech2Filter">
<option value="">Technical Round-2 Cleared?</option>
</select>

<select id="hrFilter">
<option value="">HR Interview Cleared?</option>
</select>

<select id="managerialFilter">
<option value="">Managerial Round Cleared?</option>
</select>
</div>
</div>

<div class="table-container">

<table id="placementTable">

<thead></thead>

<tbody></tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>

/* CSV URL */

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSwSxs2JtEUGewXFCvir7vQJMjsIdS-ODqzBeAQTi_4Wmp73pDTPh27f7qTedZpu_CTmMiBLMLf5lzm/pub?gid=837128863&single=true&output=csv";

let allData=[];

// Dynamic Header Keys Row 1
let branchKey = "";
let appliedCompanyKey = "";
let tpoKey = "";
let companyShortlistKey = "";
let paperTest1Key = "";
let paperTest2Key = "";
let rollKey = "";

// Dynamic Header Keys Row 2
let gdKey = "";
let oa1Key = "";
let oa2Key = "";
let oa3Key = "";
let tech1Key = "";
let tech2Key = "";
let hrKey = "";
let managerialKey = "";

/* LOAD CSV */

Papa.parse(csvURL,{

download:true,

header:true,

skipEmptyLines:true,

complete:function(results){

allData = results.data.filter(
row => Object.values(row).join("").trim() !== ""
);

if(allData.length===0){

alert("No Data Found");

return;

}

let headers = Object.keys(allData[0]);

// Dynamic scanning logic mapping variables safely to column variations
branchKey = headers.find(h => h.toLowerCase().trim().includes("branch")) || "Branch";
appliedCompanyKey = headers.find(h => h.toLowerCase().trim().replace(/\s+/g, '').includes("appliedcompany")) || "Applied Company";
tpoKey = headers.find(h => h.toLowerCase().trim().includes("tpo")) || "Shortlisted by TPO";
companyShortlistKey = headers.find(h => h.toLowerCase().trim().includes("shortlisted by company")) || "Shortlisted by Company";
rollKey = headers.find(h => h.toLowerCase().trim().includes("roll")) || "Roll Number";

paperTest1Key = headers.find(h => {
    let clean = h.toLowerCase().trim().replace(/\s+/g, '');
    return (clean.includes("pen") || clean.includes("paper")) && (clean.includes("test-1") || clean.includes("test1"));
}) || "";

paperTest2Key = headers.find(h => {
    let clean = h.toLowerCase().trim().replace(/\s+/g, '');
    return (clean.includes("pen") || clean.includes("paper")) && (clean.includes("test-2") || clean.includes("test2"));
}) || "";

// Finding Row 2 Columns dynamically
gdKey = headers.find(h => h.toLowerCase().trim().includes("group discussion")) || "Group Discussion Cleared?";
oa1Key = headers.find(h => h.toLowerCase().trim().includes("online assessment-1") || (h.toLowerCase().includes("assessment-1") && h.toLowerCase().includes("online"))) || "Online Assessment-1 Cleared?";
oa2Key = headers.find(h => h.toLowerCase().trim().includes("online assessment-2") || (h.toLowerCase().includes("assessment-2") && h.toLowerCase().includes("online"))) || "Online Assessment-2 Cleared?";
oa3Key = headers.find(h => h.toLowerCase().trim().includes("online assessment-3") || (h.toLowerCase().includes("assessment-3") && h.toLowerCase().includes("online"))) || "Online Assessment-3 Cleared?";
tech1Key = headers.find(h => h.toLowerCase().trim().includes("technical interview round-1") || (h.toLowerCase().includes("technical") && h.toLowerCase().includes("round-1"))) || "Technical Interview Round-1 Cleared?";
tech2Key = headers.find(h => h.toLowerCase().trim().includes("technical interview round-2") || (h.toLowerCase().includes("technical") && h.toLowerCase().includes("round-2"))) || "Technical Interview Round-2 Cleared?";
hrKey = headers.find(h => h.toLowerCase().trim().includes("hr interview")) || "HR Interview Cleared";
managerialKey = headers.find(h => h.toLowerCase().trim().includes("managerial round")) || "Managerial Round Cleared?";

buildTable(allData);

populateFilters(allData);

updateStats(allData);

},

error:function(err){

console.log(err);

alert("CSV Loading Failed");

}

});

/* BUILD TABLE */

function buildTable(data){

let thead=document.querySelector("#placementTable thead");

let tbody=document.querySelector("#placementTable tbody");

thead.innerHTML="";

tbody.innerHTML="";

if(data.length===0){

tbody.innerHTML=
"<tr><td colspan='20'>No Records Found</td></tr>";

return;

}

let headers=Object.keys(data[0]);

let tr=document.createElement("tr");

/* HEADERS */

headers.forEach(h=>{

let th=document.createElement("th");

th.innerText=h;

tr.appendChild(th);

});

thead.appendChild(tr);

/* ROWS */

data.forEach(row=>{

let tr=document.createElement("tr");

headers.forEach(h=>{

let td=document.createElement("td");

let value = row[h] ? row[h].toString().trim() : "";

if(value.includes("http")){

let a=document.createElement("a");

a.href=value;

a.target="_blank";

a.className="link-btn";

if(h.toLowerCase().includes("intern")){

a.innerText="📄 Internship Letter";

}

else if(h.toLowerCase().includes("offer")){

a.innerText="📄 Offer Letter";

}

else{

a.innerText="📄 View";

}

td.appendChild(a);

}

else{

td.innerText=value;

}

tr.appendChild(td);

});

tbody.appendChild(tr);

});

}

/* POPULATE FILTERS */

function populateFilters(data){

let branches=[...new Set(data.map(d=>(d[branchKey] || "").trim()).filter(Boolean))];
let appliedCompanies=[...new Set(data.map(d=>(d[appliedCompanyKey] || "").trim()).filter(Boolean))];
let tpoList=[...new Set(data.map(d=>(d[tpoKey] || "").trim()).filter(Boolean))];
let companyShortlist=[...new Set(data.map(d=>(d[companyShortlistKey] || "").trim()).filter(Boolean))];
let paperTests1= paperTest1Key ? [...new Set(data.map(d=>(d[paperTest1Key] || "").trim()).filter(Boolean))] : [];
let paperTests2= paperTest2Key ? [...new Set(data.map(d=>(d[paperTest2Key] || "").trim()).filter(Boolean))] : [];

// Unique values for new filters
let gdOptions = [...new Set(data.map(d=>(d[gdKey] || "").trim()).filter(Boolean))];
let oa1Options = [...new Set(data.map(d=>(d[oa1Key] || "").trim()).filter(Boolean))];
let oa2Options = [...new Set(data.map(d=>(d[oa2Key] || "").trim()).filter(Boolean))];
let oa3Options = [...new Set(data.map(d=>(d[oa3Key] || "").trim()).filter(Boolean))];
let tech1Options = [...new Set(data.map(d=>(d[tech1Key] || "").trim()).filter(Boolean))];
let tech2Options = [...new Set(data.map(d=>(d[tech2Key] || "").trim()).filter(Boolean))];
let hrOptions = [...new Set(data.map(d=>(d[hrKey] || "").trim()).filter(Boolean))];
let managerialOptions = [...new Set(data.map(d=>(d[managerialKey] || "").trim()).filter(Boolean))];

/* SELECTS */

let branchSelect=document.getElementById("branchFilter");
let appliedCompanySelect=document.getElementById("appliedCompanyFilter");
let tpoSelect=document.getElementById("tpoFilter");
let companyShortlistSelect=document.getElementById("companyShortlistFilter");
let paperTest1Select=document.getElementById("paperTest1Filter");
let paperTest2Select=document.getElementById("paperTest2Filter");

let gdSelect=document.getElementById("gdFilter");
let oa1Select=document.getElementById("oa1Filter");
let oa2Select=document.getElementById("oa2Filter");
let oa3Select=document.getElementById("oa3Filter");
let tech1Select=document.getElementById("tech1Filter");
let tech2Select=document.getElementById("tech2Filter");
let hrSelect=document.getElementById("hrFilter");
let managerialSelect=document.getElementById("managerialFilter");

/* RESET */

branchSelect.innerHTML='<option value="">All Branches</option>';
appliedCompanySelect.innerHTML='<option value="">Applied Company</option>';
tpoSelect.innerHTML='<option value="">Shortlisted by TPO</option>';
companyShortlistSelect.innerHTML='<option value="">Shortlisted by Company</option>';
paperTest1Select.innerHTML='<option value="">Pen & Paper Test -1 Status</option>';
paperTest2Select.innerHTML='<option value="">Pen & Paper Test -2 Status</option>';

gdSelect.innerHTML='<option value="">GD Cleared?</option>';
oa1Select.innerHTML='<option value="">Online Assessment-1 Cleared?</option>';
oa2Select.innerHTML='<option value="">Online Assessment-2 Cleared?</option>';
oa3Select.innerHTML='<option value="">Online Assessment-3 Cleared?</option>';
tech1Select.innerHTML='<option value="">Technical Round-1 Cleared?</option>';
tech2Select.innerHTML='<option value="">Technical Round-2 Cleared?</option>';
hrSelect.innerHTML='<option value="">HR Interview Cleared?</option>';
managerialSelect.innerHTML='<option value="">Managerial Round Cleared?</option>';

/* ADD OPTIONS */

branches.sort().forEach(v=> branchSelect.add(new Option(v,v)));
appliedCompanies.sort().forEach(v=> appliedCompanySelect.add(new Option(v,v)));
tpoList.sort().forEach(v=> tpoSelect.add(new Option(v,v)));
companyShortlist.sort().forEach(v=> companyShortlistSelect.add(new Option(v,v)));
paperTests1.sort().forEach(v=> paperTest1Select.add(new Option(v,v)));
paperTests2.sort().forEach(v=> paperTest2Select.add(new Option(v,v)));

gdOptions.sort().forEach(v=> gdSelect.add(new Option(v,v)));
oa1Options.sort().forEach(v=> oa1Select.add(new Option(v,v)));
oa2Options.sort().forEach(v=> oa2Select.add(new Option(v,v)));
oa3Options.sort().forEach(v=> oa3Select.add(new Option(v,v)));
tech1Options.sort().forEach(v=> tech1Select.add(new Option(v,v)));
tech2Options.sort().forEach(v=> tech2Select.add(new Option(v,v)));
hrOptions.sort().forEach(v=> hrSelect.add(new Option(v,v)));
managerialOptions.sort().forEach(v=> managerialSelect.add(new Option(v,v)));

}

/* UPDATE STATS */

function updateStats(data){

document.getElementById("totalOffers").innerText=data.length;

let uniqueStudents=new Set();

data.forEach(row=>{

if(row[rollKey]) {
uniqueStudents.add(row[rollKey].toString().trim());
}

});

document.getElementById("placedStudents").innerText=
uniqueStudents.size;

}

/* APPLY FILTERS */

function applyFilters(){

let search=document.getElementById("search").value.toLowerCase();

let branch=document.getElementById("branchFilter").value;
let appliedComp=document.getElementById("appliedCompanyFilter").value;
let tpo=document.getElementById("tpoFilter").value;
let companyShort=document.getElementById("companyShortlistFilter").value;
let paperTest1=document.getElementById("paperTest1Filter").value;
let paperTest2=document.getElementById("paperTest2Filter").value;

let gdValue=document.getElementById("gdFilter").value;
let oa1Value=document.getElementById("oa1Filter").value;
let oa2Value=document.getElementById("oa2Filter").value;
let oa3Value=document.getElementById("oa3Filter").value;
let tech1Value=document.getElementById("tech1Filter").value;
let tech2Value=document.getElementById("tech2Filter").value;
let hrValue=document.getElementById("hrFilter").value;
let managerialValue=document.getElementById("managerialFilter").value;

/* FILTER */

let filtered=allData.filter(row=>{

let text=JSON.stringify(row).toLowerCase();

let rowBranch = (row[branchKey] || "").toString().trim();
let rowAppliedComp = (row[appliedCompanyKey] || "").toString().trim();
let rowTpo = (row[tpoKey] || "").toString().trim();
let rowCompanyShort = (row[companyShortlistKey] || "").toString().trim();
let rowPaperTest1 = paperTest1Key ? (row[paperTest1Key] || "").toString().trim() : "";
let rowPaperTest2 = paperTest2Key ? (row[paperTest2Key] || "").toString().trim() : "";

let rowGd = (row[gdKey] || "").toString().trim();
let rowOa1 = (row[oa1Key] || "").toString().trim();
let rowOa2 = (row[oa2Key] || "").toString().trim();
let rowOa3 = (row[oa3Key] || "").toString().trim();
let rowTech1 = (row[tech1Key] || "").toString().trim();
let rowTech2 = (row[tech2Key] || "").toString().trim();
let rowHr = (row[hrKey] || "").toString().trim();
let rowManagerial = (row[managerialKey] || "").toString().trim();

return text.includes(search)

&& (branch==="" || rowBranch===branch)

&& (appliedComp==="" || rowAppliedComp===appliedComp)

&& (tpo==="" || rowTpo===tpo)

&& (companyShort==="" || rowCompanyShort===companyShort)

&& (paperTest1==="" || rowPaperTest1===paperTest1)

&& (paperTest2==="" || rowPaperTest2===paperTest2)

&& (gdValue==="" || rowGd===gdValue)
&& (oa1Value==="" || rowOa1===oa1Value)
&& (oa2Value==="" || rowOa2===oa2Value)
&& (oa3Value==="" || rowOa3===oa3Value)
&& (tech1Value==="" || rowTech1===tech1Value)
&& (tech2Value==="" || rowTech2===tech2Value)
&& (hrValue==="" || rowHr===hrValue)
&& (managerialValue==="" || rowManagerial===managerialValue);

});

buildTable(filtered);

updateStats(filtered);

}

/* EVENTS */

document.getElementById("search").addEventListener("keyup",applyFilters);
document.getElementById("branchFilter").addEventListener("change",applyFilters);
document.getElementById("appliedCompanyFilter").addEventListener("change",applyFilters);
document.getElementById("tpoFilter").addEventListener("change",applyFilters);
document.getElementById("companyShortlistFilter").addEventListener("change",applyFilters);
document.getElementById("paperTest1Filter").addEventListener("change",applyFilters);
document.getElementById("paperTest2Filter").addEventListener("change",applyFilters);

document.getElementById("gdFilter").addEventListener("change",applyFilters);
document.getElementById("oa1Filter").addEventListener("change",applyFilters);
document.getElementById("oa2Filter").addEventListener("change",applyFilters);
document.getElementById("oa3Filter").addEventListener("change",applyFilters);
document.getElementById("tech1Filter").addEventListener("change",applyFilters);
document.getElementById("tech2Filter").addEventListener("change",applyFilters);
document.getElementById("hrFilter").addEventListener("change",applyFilters);
document.getElementById("managerialFilter").addEventListener("change",applyFilters);

</script>

</body>
</html>
