<!DOCTYPE html>
<html>
<head>

<title>MGIT Placement Portal</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:15px;
}

h1{text-align:center;}
h3{text-align:center;margin-top:-10px;}

.table-container{
overflow:auto;
max-height:80vh;
border:1px solid #ccc;
}

/* ✅ TABLE FIXED */
table{
border-collapse:collapse;
width:100%;
background:white;
table-layout:auto;
}

th,td{
border:1px solid #ccc;
padding:8px;
font-size:13px;
text-align:center;

/* ✅ AUTO ADJUST */
white-space:normal;
word-wrap:break-word;
max-width:200px;
}

th{
background:#2c3e50;
color:white;
position:sticky;
top:0;
z-index:2;
}

tr:nth-child(even){
background:#f2f2f2;
}

</style>

</head>

<body>

<h1>MGIT Placement Records</h1>
<h3>Academic Year 2025 - 2026</h3>

<div class="table-container">
<table id="placementTable">
<thead></thead>
<tbody></tbody>
</table>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlQ0WjFcZaI2eiKVtAqynVqs3H82MznXaV15n-qLjsDv6QL75g_7sQAhm0n6ZtiiDVKIB0MkuTNQ64/pub?gid=492329818&single=true&output=csv";

Papa.parse(csvURL,{
download:true,
header:true,

complete:function(results){

let data = results.data.filter(row => Object.values(row).join("").trim() !== "");

console.log("Data Loaded:", data);

let thead=document.querySelector("#placementTable thead");
let tbody=document.querySelector("#placementTable tbody");

thead.innerHTML="";
tbody.innerHTML="";

if(data.length === 0){
thead.innerHTML="<tr><th>No Data Found</th></tr>";
return;
}

let headers=Object.keys(data[0]);

// ✅ Header
let tr=document.createElement("tr");
headers.forEach(h=>{
let th=document.createElement("th");
th.innerText=h;
tr.appendChild(th);
});
thead.appendChild(tr);

// ✅ Rows
data.forEach(row=>{
let tr=document.createElement("tr");
headers.forEach(h=>{
let td=document.createElement("td");
td.innerText=row[h];
tr.appendChild(td);
});
tbody.appendChild(tr);
});

},

error:function(err){
console.error("Error:", err);
alert("Error loading data!");
}

});

</script>

</body>
</html>
