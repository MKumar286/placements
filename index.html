<!DOCTYPE html>
<html>
<head>

<title>MGIT Placement Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Arial, sans-serif;
padding: 8px; /* Tight perimeter spacing */
overflow-x:hidden;
color:white;
background: #0d1117; /* Clean, premium dark background */
min-height:100vh;
}

/* HEADER SECTION */
.header-box{
background: linear-gradient(135deg, #161b22, #0d1117);
padding: 10px;
border-radius: 12px 12px 0 0;
margin-bottom: 0;
border: 1px solid rgba(255,255,255,0.08);
border-bottom: none;
text-align: center;
}

/* HEADINGS WITH ULTRA PREMIUM GLOWING SATIN-GOLD EFFECT */
h1{
font-size: 28px;
font-weight: 800;
background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f);
background-size: 200% auto;
animation: premiumGold 4s linear infinite;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin-bottom: 2px;
letter-spacing: 0.5px;
}

@keyframes premiumGold {
0% { background-position: 0% center; }
100% { background-position: 200% center; }
}

h3{
font-size: 14px;
margin-top: 0;
font-weight: 600;
color: #8b949e;
}

/* STATS */
.stats{
margin: 0;
font-weight: 700;
font-size: 14px;
display: flex;
justify-content: center;
gap: 20px;
flex-wrap: wrap;
padding: 6px 12px; /* Tight padding */
background: #1f242c;
border-radius: 0;
border-left: 1px solid rgba(255,255,255,0.08);
border-right: 1px solid rgba(255,255,255,0.08);
color: #58a6ff;
}

/* FILTER SECTION - REARRANGED SINGLE ROW WRAP WITH NO SCROLLING */
.controls{
margin-bottom: 0;
display: flex;
flex-wrap: wrap; /* Allows perfect wrap into standard block instead of scrolling */
gap: 5px; /* Extremely tight gap */
background: #161b22;
padding: 6px 8px;
border-radius: 0 0 12px 12px;
box-shadow: none;
border: 1px solid rgba(255,255,255,0.08);
border-top: none;
}

/* FILTERS & TARGETED DROP MENU NORMAL FONT CONFIGURATION */
.controls input,
.controls select,
.salary-row-inputs input{
flex: 1 1 160px; /* Adapts dynamically into row flow grid space */
height: 28px;
padding: 2px 6px;
font-size: 12px;
font-weight: 400; /* Regular normal font text weight */
border-radius: 4px;
border: 1px solid #30363d;
outline: none;
background: #0d1117;
color: #c9d1d9;
transition: 0.2s;
}

.controls input::placeholder,
.salary-row-inputs input::placeholder {
color: #8b949e;
font-weight: 400; /* Normal text placeholder weight */
}

/* FOCUS */
.controls input:focus,
.controls select:focus,
.salary-row-inputs input:focus{
border-color: #58a6ff;
box-shadow: 0 0 0 2px rgba(88,166,255,0.3);
}

/* SECOND ROW ACTION AND SALARY FILTER CONTAINER */
.action-salary-container {
display: flex;
justify-content: space-between;
align-items: center;
margin: 4px 0; /* Minimal compact vertical gap separating items */
gap: 6px;
}

.salary-row-inputs {
display: flex;
gap: 5px;
justify-content: center;
flex-grow: 1;
}

.salary-row-inputs input {
max-width: 140px;
background: #0d1117;
}

.export-wrapper {
flex-shrink: 0;
display: flex;
justify-content: flex-end;
}

.left-spacer {
width: 80px;
flex-shrink: 0;
}

.micro-excel-btn {
background: #238636;
color: white;
border: 1px solid rgba(255,255,255,0.1);
padding: 4px 10px;
border-radius: 4px;
font-size: 11px;
font-weight: 600;
cursor: pointer;
transition: 0.2s;
display: flex;
align-items: center;
gap: 4px;
}

.micro-excel-btn:hover {
background: #2ea44f;
}

/* TABLE CONTAINER */
.table-container{
width: 100%;
overflow-x: auto;
overflow-y: hidden;
border-radius: 8px;
background: #161b22;
padding-bottom: 0;
margin-top: 0; /* Flows instantly right below action panel strip */
border: 1px solid rgba(255,255,255,0.08);
}

/* SCROLLBAR */
.table-container::-webkit-scrollbar{
height: 8px;
}
.table-container::-webkit-scrollbar-track{
background: #0d1117;
}
.table-container::-webkit-scrollbar-thumb{
background: #30363d;
border-radius: 4px;
}

/* TABLE */
table{
border-collapse: collapse;
min-width: 100%;
width: max-content;
background: #161b22;
color: #c9d1d9;
}

/* TABLE HEADER */
th{
padding: 6px 8px;
font-size: 12px;
font-weight: 700;
text-align: center;
background: #21262d;
color: #f0f6fc;
border: 1px solid #30363d;
white-space: nowrap;
}

/* TABLE DATA ROWS - REDUCED HEIGHT AND REGULAR FONT TEXT */
td{
padding: 3px 8px; /* Decreased row padding height to fit perfectly */
font-size: 12px;
font-weight: 400; /* Normal weight text */
text-align: center;
white-space: nowrap;
border: 1px solid #30363d;
height: 24px; /* Ultra-low fixed profile grid line tracking */
}

/* ROW ALTERNATION STRIPES */
tr:nth-child(even){
background: #1f242c;
}
tr:nth-child(odd){
background: #161b22;
}

/* HOVER EFFECT */
tbody tr:hover{
background: #262c36;
}

/* ACTION LINK GRAPHIC LINK PORTAL COMPONENT */
.link-btn{
background: #21262d;
color: #58a6ff;
padding: 1px 6px;
border-radius: 3px;
text-decoration: none;
font-size: 10px;
font-weight: 400;
display: inline-block;
border: 1px solid #30363d;
transition: 0.2s;
}

.link-btn:hover{
background: #30363d;
color: #79c0ff;
}

/* MOBILE RESPONSIVENESS BREAKDOWN LAYOUT CODES */
@media(max-width:768px){
body{
padding: 4px;
}
h1{
font-size: 20px;
}
h3{
font-size: 12px;
}
.stats{
font-size: 12px;
gap: 10px;
padding: 4px;
}
.controls{
padding: 4px;
gap: 4px;
}
.controls input,
.controls select{
flex: 1 1 120px;
height: 26px;
font-size: 11px;
}
.action-salary-container {
flex-direction: column;
margin: 4px 0;
gap: 4px;
}
.left-spacer {
display: none;
}
.salary-row-inputs {
width: 100%;
}
.salary-row-inputs input {
width: 50%;
max-width: none;
}
.export-wrapper {
width: 100%;
}
.micro-excel-btn {
width: 100%;
justify-content: center;
}
th, td{
font-size: 11px;
padding: 3px 4px;
}
}

</style>

</head>

<body>

<div class="header-box">
    <h1>MGIT Placement Records</h1>
    <h3>Academic Year 2025 - 2026</h3>
</div>

<div class="stats">
    <div>Total Offers : <span id="totalOffers">0</span></div>
    <div>Total Placed Students : <span id="placedStudents">0</span></div>
</div>

<div class="controls">
    <input type="text" id="search" placeholder="Search student / roll / company">
    
    <select id="batchFilter"><option value="">All Batches</option></select>
    <select id="branchFilter"><option value="">All Branches</option></select>
    <select id="companyFilter"><option value="">All Companies</option></select>
    <select id="natureFilter"><option value="">Nature of the Company</option></select>
    <select id="internFilter"><option value="">Internship Type</option></select>
    <select id="genderFilter"><option value="">All Genders</option></select>
</div>

<div class="action-salary-container">
    <div class="left-spacer"></div>
    
    <div class="salary-row-inputs">
        <input type="number" id="minSalary" step="any" placeholder="Min Salary (>=)">
        <input type="number" id="maxSalary" step="any" placeholder="Max Salary (<=)">
    </div>
    
    <div class="export-wrapper">
        <button id="exportExcelBtn" class="micro-excel-btn">📥 Excel</button>
    </div>
</div>

<div class="table-container">
    <table id="placementTable">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>

/* CSV URL Link Pointer mapping setup */
const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlQ0WjFcZaI2eiKVtAqynVqs3H82MznXaV15n-qLjsDv6QL75g_7sQAhm0n6ZtiiDVKIB0MkuTNQ64/pub?gid=492329818&single=true&output=csv";

let allData=[];
let currentFilteredData=[];

let natureKey="";
let internKey="";
let salaryKey=""; 

/* LOAD DATA FROM PUBLISHED LINK SOURCE INSTANCE */
Papa.parse(csvURL,{
download:true,
header:true,
skipEmptyLines:true,
complete:function(results){

allData = results.data.filter(row => {
  let combinedRowText = Object.values(row).join("").trim();
  let lowercaseText = combinedRowText.toLowerCase();
  return combinedRowText !== "" && 
         !lowercaseText.includes("displaying index.html") &&
         !lowercaseText.includes("index.html");
});

if(allData.length===0){
alert("No Data Found or Row Structure Invalid");
return;
}

let headers = Object.keys(allData[0]);

natureKey = headers.find(h => h.toLowerCase().includes("nature"));
internKey = headers.find(h => h.toLowerCase().includes("paid"));
salaryKey = headers.find(h => h.toLowerCase().includes("salary") || h.toLowerCase().includes("lpa") || h.toLowerCase().includes("package"));

currentFilteredData = [...allData];

buildTable(allData);
populateFilters(allData);
updateStats(allData);
},
error:function(err){
console.log(err);
alert("CSV Loading Failed");
}
});

/* BUILD DATA GRID DOM SYSTEM */
function buildTable(data){
let thead=document.querySelector("#placementTable thead");
let tbody=document.querySelector("#placementTable tbody");

thead.innerHTML="";
tbody.innerHTML="";

if(data.length===0){
tbody.innerHTML="<tr><td colspan='20'>No Records Found</td></tr>";
return;
}

let headers=Object.keys(data[0]);
let tr=document.createElement("tr");

headers.forEach(h=>{
let th=document.createElement("th");
th.innerText=h;
tr.appendChild(th);
});
thead.appendChild(tr);

data.forEach(row=>{
let tr=document.createElement("tr");
headers.forEach(h=>{
let td=document.createElement("td");
let value = row[h] ? row[h].toString().trim() : "";

if(value.includes("http")){
let a=document.createElement("a");
a.href=value;
a.target="_blank";
a.className="link-btn";

if(h.toLowerCase().includes("intern")){
a.innerText="📄 Intern Letter";
}
else if(h.toLowerCase().includes("offer")){
a.innerText="📄 Offer Letter";
}
else{
a.innerText="📄 View";
}
td.appendChild(a);
}
else{
td.innerText=value;
}
tr.appendChild(td);
});
tbody.appendChild(tr);
});
}

/* DYNAMIC DROP MENU GENERATION ARRAY ROUTINES */
function populateFilters(data){
let batches=[...new Set(data.map(d=>d["Batch"]).filter(Boolean))];
let branches=[...new Set(data.map(d=>d["Branch"]).filter(Boolean))];
let companies=[...new Set(data.map(d=>d["Company Placed"]).filter(Boolean))];
let natures=[...new Set(data.map(d => (d[natureKey] || "").trim()).filter(v=>v))];
let interns=[...new Set(data.map(d => (d[internKey] || "").trim()).filter(v=>v))];
let genders=[...new Set(data.map(d => (d["Gender"] || "").trim()).filter(v=>v))];

let batchSelect=document.getElementById("batchFilter");
let branchSelect=document.getElementById("branchFilter");
let companySelect=document.getElementById("companyFilter");
let natureSelect=document.getElementById("natureFilter");
let internSelect=document.getElementById("internFilter");
let genderSelect=document.getElementById("genderFilter");

batchSelect.innerHTML='<option value="">All Batches</option>';
branchSelect.innerHTML='<option value="">All Branches</option>';
companySelect.innerHTML='<option value="">All Companies</option>';
natureSelect.innerHTML='<option value="">Nature of the Company</option>';
internSelect.innerHTML='<option value="">Internship Type</option>';
genderSelect.innerHTML='<option value="">All Genders</option>';

batches.sort().forEach(v=> batchSelect.add(new Option(v,v)));
branches.sort().forEach(v=> branchSelect.add(new Option(v,v)));
companies.sort().forEach(v=> companySelect.add(new Option(v,v)));
natures.sort().forEach(v=> natureSelect.add(new Option(v,v)));
interns.sort().forEach(v=> internSelect.add(new Option(v,v)));
genders.sort().forEach(v=> genderSelect.add(new Option(v,v)));
}

function updateCompanyFilter(filteredData){
let companySelect = document.getElementById("companyFilter");
let currentValue = companySelect.value;
let companies = [...new Set(filteredData.map(d => d["Company Placed"]).filter(Boolean))];

companySelect.innerHTML = '<option value="">All Companies</option>';
companies.sort().forEach(v => companySelect.add(new Option(v,v)));

if(companies.includes(currentValue)){
companySelect.value = currentValue;
}
}

/* RECALCULATE LOGS COUNTER STRIPS */
function updateStats(data){
document.getElementById("totalOffers").innerText=data.length;
let uniqueStudents=new Set();
data.forEach(row=>{
if(row["Roll Number"]) { uniqueStudents.add(row["Roll Number"]); }
});
document.getElementById("placedStudents").innerText=uniqueStudents.size;
}

/* SEARCH AND MATHEMATICAL RANGE CRITERIA CONDITIONALS ENGINE */
function applyFilters(){
let search=document.getElementById("search").value.toLowerCase();
let minSalaryVal = parseFloat(document.getElementById("minSalary").value);
let maxSalaryVal = parseFloat(document.getElementById("maxSalary").value);

let batch=document.getElementById("batchFilter").value;
let branch=document.getElementById("branchFilter").value;
let company=document.getElementById("companyFilter").value;
let nature=document.getElementById("natureFilter").value;
let intern=document.getElementById("internFilter").value;
let gender=document.getElementById("genderFilter").value;

let filtered=allData.filter(row=>{
let text=JSON.stringify(row).toLowerCase();
let currentSalaryNum = NaN;

if(salaryKey && row[salaryKey]) {
  let cleanedStr = row[salaryKey].toString().replace(/[^0-9.]/g, '');
  if(cleanedStr.trim() !== "") { currentSalaryNum = parseFloat(cleanedStr); }
}

let fulfillsMinBound = isNaN(minSalaryVal) || (!isNaN(currentSalaryNum) && currentSalaryNum >= minSalaryVal);
let fulfillsMaxBound = isNaN(maxSalaryVal) || (!isNaN(currentSalaryNum) && currentSalaryNum <= maxSalaryVal);

return text.includes(search)
&& fulfillsMinBound
&& fulfillsMaxBound
&& (batch==="" || row["Batch"]===batch)
&& (branch==="" || row["Branch"]===branch)
&& (company==="" || row["Company Placed"]===company)
&& (nature==="" || (row[natureKey] || "").trim()===nature)
&& (intern==="" || (row[internKey] || "").trim()===intern)
&& (gender==="" || (row["Gender"] || "").trim()===gender);
});

currentFilteredData = filtered;

updateCompanyFilter(filtered);
buildTable(filtered);
updateStats(filtered);
}

/* SYSTEM SHEET LOCAL STORAGE EXPORT CONVERSION UTILITY */
function handleExcelExport() {
  if (!currentFilteredData || currentFilteredData.length === 0) {
    alert("No active records available to download!");
    return;
  }
  
  let headers = Object.keys(currentFilteredData[0]);
  let outputCSV = "\uFEFF"; 
  outputCSV += headers.map(h => `"${h.replace(/"/g, '""')}"`).join(",") + "\r\n";
  
  currentFilteredData.forEach(row => {
    let rowLine = headers.map(h => {
      let value = row[h] ? row[h].toString().trim() : "";
      return `"${value.replace(/"/g, '""')}"`;
    });
    outputCSV += rowLine.join(",") + "\r\n";
  });
  
  let binaryBlob = new Blob([outputCSV], { type: "text/csv;charset=utf-8;" });
  let virtualAnchor = document.createElement("a");
  let objectURL = URL.createObjectURL(binaryBlob);
  
  virtualAnchor.setAttribute("href", objectURL);
  virtualAnchor.setAttribute("download", "MGIT_Filtered_Placements.csv");
  virtualAnchor.style.visibility = "hidden";
  document.body.appendChild(virtualAnchor);
  virtualAnchor.click();
  document.body.removeChild(virtualAnchor);
}

/* CORE DRIVER RUNTIME BINDING SUBSYSTEM */
document.getElementById("search").addEventListener("keyup",applyFilters);
document.getElementById("minSalary").addEventListener("input",applyFilters);
document.getElementById("maxSalary").addEventListener("input",applyFilters);
document.getElementById("batchFilter").addEventListener("change",applyFilters);
document.getElementById("branchFilter").addEventListener("change",applyFilters);
document.getElementById("companyFilter").addEventListener("change",applyFilters);
document.getElementById("natureFilter").addEventListener("change",applyFilters);
document.getElementById("internFilter").addEventListener("change",applyFilters);
document.getElementById("genderFilter").addEventListener("change",applyFilters);
document.getElementById("exportExcelBtn").addEventListener("click", handleExcelExport);

</script>

</body>
</html>
