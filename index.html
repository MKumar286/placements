<!DOCTYPE html>
<html>
<head>
<title>MGIT Placement Portal</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:15px;}
table{border-collapse:collapse;width:100%;background:white;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#2c3e50;color:white;}
</style>
</head>

<body>

<h2>Placement Data (Test)</h2>

<table id="placementTable">
<thead></thead>
<tbody></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlQ0WjFcZaI2eiKVtAqynVqs3H82MznXaV15n-qLjsDv6QL75g_7sQAhm0n6ZtiiDVKIB0MkuTNQ64/pub?gid=492329818&single=true&output=csv";

Papa.parse(csvURL,{
download:true,
header:true,

complete:function(results){

let data = results.data.filter(row => Object.values(row).join("").trim() !== "");

console.log("Data Loaded:", data);

if(data.length === 0){
  alert("No data found!");
  return;
}

let thead=document.querySelector("#placementTable thead");
let tbody=document.querySelector("#placementTable tbody");

thead.innerHTML="";
tbody.innerHTML="";

let headers=Object.keys(data[0]);

// Create header
let tr=document.createElement("tr");
headers.forEach(h=>{
let th=document.createElement("th");
th.innerText=h;
tr.appendChild(th);
});
thead.appendChild(tr);

// Create rows
data.forEach(row=>{
let tr=document.createElement("tr");
headers.forEach(h=>{
let td=document.createElement("td");
td.innerText=row[h];
tr.appendChild(td);
});
tbody.appendChild(tr);
});

},

error:function(err){
console.error("PapaParse Error:", err);
alert("Error loading CSV!");
}

});

</script>

</body>
</html>
