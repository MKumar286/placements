<!DOCTYPE html>
<html>
<head>

<title>MGIT Placement Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
padding:15px;
overflow-x:hidden;
color:white;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
min-height:100vh;
}

/* Animated Background */

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Glow */

body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:rgba(0,198,255,0.15);
border-radius:50%;
top:-120px;
left:-120px;
filter:blur(100px);
animation:float1 10s infinite alternate;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:400px;
height:400px;
background:rgba(255,0,150,0.15);
border-radius:50%;
bottom:-100px;
right:-100px;
filter:blur(100px);
animation:float2 12s infinite alternate;
z-index:-1;
}

@keyframes float1{
from{transform:translateY(0px);}
to{transform:translateY(80px);}
}

@keyframes float2{
from{transform:translateX(0px);}
to{transform:translateX(-80px);}
}

/* HEADER */

.header-box{

background:linear-gradient(135deg,#000814,#001d3d,#003566);

padding:6px 10px;

border-radius:18px 18px 0 0;

margin-bottom:0;

box-shadow:0 6px 20px rgba(0,0,0,0.35);

border:1px solid rgba(255,255,255,0.15);

border-bottom:none;

text-align:center;

}


/* HEADINGS */

h1{

font-size:34px;

font-weight:bold;

background:linear-gradient(90deg,#ffffff,#ffe082,#ffffff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:8px;

letter-spacing:1px;

}

h3{

font-size:18px;
margin-top:2px;
font-weight:500;

background:linear-gradient(90deg,#b2ff59,#00e5ff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* STATS */

.stats{

margin:0;

font-weight:bold;

font-size:18px;

display:flex;

justify-content:center;

gap:25px;

flex-wrap:wrap;

padding:8px 12px;

background: linear-gradient(135deg, #064420, #0b6b35);

border-radius:0;

box-shadow:none;

border-left:1px solid rgba(255,255,255,0.15);

border-right:1px solid rgba(255,255,255,0.15);

color:white;

}

/* FILTER SECTION */

.controls{

margin-bottom:6px;

display:flex;

flex-wrap:nowrap;

gap:6px;

background:rgba(255,255,255,0.12);

padding:6px 8px;

border-radius:0 0 14px 14px;

backdrop-filter:blur(10px);

box-shadow:0 6px 20px rgba(0,0,0,0.25);

border:1px solid rgba(255,255,255,0.15);

border-top:none;

overflow-x:auto;

overflow-y:hidden;

scroll-behavior:smooth;

}
/* FILTERS */

.controls input,
.controls select{

flex:0 0 auto;

width:170px;
min-width:170px;

height:30px;

padding:4px 8px;

font-size:12px;

border-radius:8px;

border:1px solid rgba(255,255,255,0.2);

outline:none;

background:rgba(255,255,255,0.92);

transition:0.3s;

}

.controls input::placeholder {
color: #555;
}

/* FOCUS */

.controls input:focus,
.controls select:focus{

transform:scale(1.02);

box-shadow:0 0 10px rgba(255,255,255,0.5);

border:1px solid #00c6ff;

}

/* FILTER SCROLLBAR */

.controls::-webkit-scrollbar{
height:7px;
}

.controls::-webkit-scrollbar-track{
background:rgba(255,255,255,0.08);
border-radius:10px;
}

.controls::-webkit-scrollbar-thumb{
background:linear-gradient(90deg,#00c6ff,#0072ff);
border-radius:10px;
}

/* EXCEL ACTION STRIP CONTAINER */
.action-container {
display: flex;
justify-content: flex-end;
margin: 6px 4px;
}

.micro-excel-btn {
background: linear-gradient(135deg, #1d743a, #107c41);
color: white;
border: 1px solid rgba(255,255,255,0.2);
padding: 4px 10px;
border-radius: 5px;
font-size: 11px;
font-weight: bold;
cursor: pointer;
transition: 0.2s ease;
box-shadow: 0 2px 8px rgba(0,0,0,0.3);
display: flex;
align-items: center;
gap: 4px;
}

.micro-excel-btn:hover {
transform: scale(1.03);
background: linear-gradient(135deg, #107c41, #0b592e);
box-shadow: 0 4px 10px rgba(0,180,90,0.4);
}

.micro-excel-btn:active {
transform: scale(0.97);
}

/* TABLE CONTAINER */

.table-container{

width:100%;

overflow-x:auto;

overflow-y:hidden;

border-radius:18px;

box-shadow:0 8px 25px rgba(0,0,0,0.35);

scroll-behavior:smooth;

background:rgba(255,255,255,0.05);

padding-bottom:6px;

}

/* TABLE SCROLLBAR */

.table-container::-webkit-scrollbar{

height:10px;

}

.table-container::-webkit-scrollbar-track{

background:rgba(255,255,255,0.08);

border-radius:10px;

}

.table-container::-webkit-scrollbar-thumb{

background:linear-gradient(90deg,#ff512f,#dd2476);

border-radius:10px;

}

.table-container::-webkit-scrollbar-thumb:hover{

background:linear-gradient(90deg,#00c6ff,#0072ff);

}

/* TABLE */

table{

border-collapse:collapse;

min-width:1600px;

width:max-content;

background:#ffffff;

color:#222;

border-radius:18px;

overflow:hidden;

}

/* TABLE HEADER */

th{

padding:8px 9px;

font-size:13px;

font-weight:bold;

text-align:center;

background:linear-gradient(135deg,#141e30,#243b55);

color:#ffffff;
line-height:1.3;
border:1px solid rgba(255,255,255,0.12);

white-space:nowrap;

}

/* TABLE DATA */

td{

padding:5px 9px;

font-size:12px;

font-weight:500;

text-align:center;

white-space:nowrap;

border:1px solid rgba(16,37,66,0.12);

}

/* ROW COLORS */

tr:nth-child(even){

background:#eef5ff;

}

tr:nth-child(odd){

background:#ffffff;

}

/* HOVER */

tbody tr:hover{

background:#ffd180;

transition:0.3s;

}

/* BUTTON */

.link-btn{

background:linear-gradient(135deg,#667eea,#764ba2);

color:white;

padding:3px 8px;

border-radius:6px;

text-decoration:none;

font-size:10px;

font-weight:bold;
  
line-height:1.2;

display:inline-block;

transition:0.3s;

box-shadow:0 3px 10px rgba(0,0,0,0.2);

}

.link-btn:hover{

transform:scale(1.06);

background:linear-gradient(135deg,#43cea2,#185a9d);

}

/* MOBILE */

@media(max-width:768px){

body{
padding:10px;
}

h1{
font-size:22px;
}

h3{
font-size:15px;
}

.stats{

font-size:13px;

gap:12px;

padding:6px;

}

.controls{

padding:5px;

gap:5px;

}

.controls input,
.controls select{

width:145px;
min-width:145px;

height:28px;
padding:3px 6px;
font-size:12px;

}

.action-container {
margin: 4px 2px;
}

th{

font-size:11px;

padding:5px 6px;

}

td{

font-size:11px;

padding:4px 6px;

}

table{

min-width:1400px;

}

}

</style>

</head>

<body>

<h3>Academic Year 2025 - 2026</h3>

</div>

<div class="stats">

</div>

);

alert("No Data Found");

return;

}

);

);

);

buildTable(allData);

populateFilters(allData);

updateStats(allData);

},

error:function(err){

console.log(err);

alert("CSV Loading Failed");

}

});

"<tr><td colspan='20'>No Records Found</td></tr>";
