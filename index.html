<!DOCTYPE html>
<html>
<head>

<title>MGIT Placement Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
padding:15px;
overflow-x:hidden;
color:white;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
min-height:100vh;
}

/* Animated Background */

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Glow */

body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:rgba(0,198,255,0.15);
border-radius:50%;
top:-120px;
left:-120px;
filter:blur(100px);
animation:float1 10s infinite alternate;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:400px;
height:400px;
background:rgba(255,0,150,0.15);
border-radius:50%;
bottom:-100px;
right:-100px;
filter:blur(100px);
animation:float2 12s infinite alternate;
z-index:-1;
}

@keyframes float1{
from{transform:translateY(0px);}
to{transform:translateY(80px);}
}

@keyframes float2{
from{transform:translateX(0px);}
to{transform:translateX(-80px);}
}

/* HEADER */

.header-box{

background:linear-gradient(135deg,#000814,#001d3d,#003566);

padding:6px 10px;

border-radius:18px 18px 0 0;

margin-bottom:0;

box-shadow:0 6px 20px rgba(0,0,0,0.35);

border:1px solid rgba(255,255,255,0.15);

border-bottom:none;

text-align:center;

}


/* HEADINGS */

h1{

font-size:34px;

font-weight:bold;

background:linear-gradient(90deg,#ffffff,#ffe082,#ffffff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:8px;

letter-spacing:1px;

}

h3{

font-size:18px;
margin-top:2px;
font-weight:500;

background:linear-gradient(90deg,#b2ff59,#00e5ff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* STATS */

.stats{

margin:0;

font-weight:bold;

font-size:18px;

display:flex;

justify-content:center;

gap:25px;

flex-wrap:wrap;

padding:8px 12px;

background: linear-gradient(135deg, #064420, #0b6b35);

border-radius:0;

box-shadow:none;

border-left:1px solid rgba(255,255,255,0.15);

border-right:1px solid rgba(255,255,255,0.15);

color:white;

}

/* FILTER SECTION */

.controls{

margin-bottom:6px;

display:flex;

flex-wrap:wrap;

gap:5px;

background:rgba(255,255,255,0.12);

padding:6px 8px;

border-radius:0 0 14px 14px;

backdrop-filter:blur(10px);

box-shadow:0 6px 20px rgba(0,0,0,0.25);

border:1px solid rgba(255,255,255,0.15);

border-top:none;

}
/* FILTERS */

.controls input,
.controls select{

flex: 1 1 150px;

height:30px;

padding:4px 8px;

font-size:12px;

border-radius:8px;

border:1px solid rgba(255,255,255,0.2);

outline:none;

background:rgba(255,255,255,0.92);

color: #000;

transition:0.3s;

}

/* FOCUS */

.controls input:focus,
.controls select:focus,
.salary-filters-row input:focus{

transform:scale(1.02);

box-shadow:0 0 10px rgba(255,255,255,0.5);

border:1px solid #00c6ff;

}

/* LOWER ACTION LAYER ROW */
.action-container {
display: flex;
justify-content: space-between;
align-items: center;
gap: 15px;
margin: 8px 4px;
flex-wrap: wrap;
}

/* Compact left-side salary inputs layout */
.salary-filters-row {
display: flex;
gap: 5px;
align-items: center;
flex-shrink: 0;
}

.salary-filters-row input {
width: 140px; 
max-width: 140px;
height: 30px;
padding: 4px 8px;
font-size: 12px;
border-radius: 8px;
border: 1px solid rgba(255,255,255,0.2);
outline: none;
background: rgba(255, 255, 255, 0.95);
color: #000;
transition: 0.3s;
}

.salary-filters-row input::placeholder {
color: #555;
}

/* MICRO CLICKABLE CARD COMPONENT WITH EXACT FILTER SIZING MATCH */
.clickable-metrics-card {
flex: 1 1 auto;
display: flex;
justify-content: center;
align-items: center;
gap: 15px;
background: rgba(255, 255, 255, 0.15);
border: 1px solid rgba(255, 255, 255, 0.25);
padding: 4px 12px;
border-radius: 8px;
backdrop-filter: blur(5px);
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
height: 30px; /* Sized exactly as the other operational row filters */
min-width: 250px;
cursor: pointer;
color: white;
font-family: Arial, sans-serif;
transition: all 0.2s ease;
}

.clickable-metrics-card:hover {
background: rgba(255, 255, 255, 0.25);
border-color: #00e5ff;
transform: translateY(-1px);
}

.clickable-metrics-card:active {
transform: translateY(1px);
}

.card-title-text {
font-size: 11px;
font-weight: bold;
letter-spacing: 0.3px;
text-transform: uppercase;
color: #ffe082;
white-space: nowrap;
border-right: 1px solid rgba(255,255,255,0.3);
padding-right: 10px;
}

.card-stat-item {
font-size: 11px;
font-weight: bold;
color: #ffffff;
white-space: nowrap;
}

.card-stat-item span {
color: #00e5ff;
font-size: 12px;
margin-left: 2px;
text-shadow: 0 0 4px rgba(0, 229, 255, 0.4);
}

/* RIGHT SIDE EXCEL ACTION */
.micro-excel-btn {
background: linear-gradient(135deg, #1d743a, #107c41);
color: white;
border: 1px solid rgba(255,255,255,0.2);
padding: 4px 14px;
border-radius: 5px;
font-size: 11px;
font-weight: bold;
cursor: pointer;
transition: 0.2s ease;
box-shadow: 0 2px 8px rgba(0,0,0,0.3);
display: flex;
align-items: center;
gap: 4px;
height: 30px;
flex-shrink: 0;
}

.micro-excel-btn:hover {
transform: scale(1.03);
background: linear-gradient(135deg, #107c41, #0b592e);
box-shadow: 0 4px 10px rgba(0,180,90,0.4);
}

.micro-excel-btn:active {
transform: scale(0.97);
}

/* TABLE CONTAINER */

.table-container{

width:100%;

overflow-x:auto;

overflow-y:hidden;

border-radius:18px;

box-shadow:0 8px 25px rgba(0,0,0,0.35);

scroll-behavior:smooth;

background:rgba(255,255,255,0.05);

padding-bottom:6px;

}

/* TABLE SCROLLBAR */

.table-container::-webkit-scrollbar{

height:10px;

}

.table-container::-webkit-scrollbar-track{

background:rgba(255,255,255,0.08);

border-radius:10px;

}

.table-container::-webkit-scrollbar-thumb{

background:linear-gradient(90deg,#ff512f,#dd2476);

border-radius:10px;

}

.table-container::-webkit-scrollbar-thumb:hover{

background:linear-gradient(90deg,#00c6ff,#0072ff);

}

/* TABLE */

table{

border-collapse:collapse;

min-width:1600px;

width:max-content;

background:#ffffff;

color:#222;

border-radius:18px;

overflow:hidden;

}

/* TABLE HEADER */

th{

padding:8px 9px;

font-size:13px;

font-weight:bold;

text-align:center;

background:linear-gradient(135deg,#141e30,#243b55);

color:#ffffff;
line-height:1.3;
border:1px solid rgba(255,255,255,0.12);

white-space:nowrap;

}

/* TABLE DATA */

td{

padding:5px 9px;

font-size:12px;

font-weight:500;

text-align:center;

white-space:nowrap;

border:1px solid rgba(16,37,66,0.12);

}

/* ROW COLORS */

tr:nth-child(even){

background:#eef5ff;

}

tr:nth-child(odd){

background:#ffffff;

}

/* HOVER */

tbody tr:hover{

background:#ffd180;

transition:0.3s;

}

/* BUTTON */

.link-btn{

background:linear-gradient(135deg,#667eea,#764ba2);

color:white;

padding:3px 8px;

border-radius:6px;

text-decoration:none;

font-size:10px;

font-weight:bold;
  
line-height:1.2;

display:inline-block;

transition:0.3s;

box-shadow:0 3px 10px rgba(0,0,0,0.2);

}

.link-btn:hover{

transform:scale(1.06);

background:linear-gradient(135deg,#00f2fe,#4facfe) !important; 

box-shadow:0 5px 15px rgba(0, 242, 254, 0.4);

color:#ffffff;

}

/* MOBILE */

@media(max-width:768px){

body{
padding:10px;
}

h1{
font-size:22px;
}

h3{
font-size:15px;
}

.stats{
font-size:13px;
gap:12px;
padding:6px;
}

.controls{
padding:5px;
gap:4px;
}

.controls input,
.controls select{
flex: 1 1 120px;
height:28px;
padding:3px 6px;
font-size:11px;
}

.action-container {
margin: 4px 2px;
flex-direction: column;
align-items: stretch;
gap: 8px;
}

.salary-filters-row {
justify-content: space-between;
width: 100%;
}

.salary-filters-row input {
width: 49%;
max-width: none;
}

.clickable-metrics-card {
width: 100%;
height: auto;
padding: 6px 10px;
flex-direction: column;
gap: 3px;
}

.card-title-text {
border-right: none;
padding-right: 0;
padding-bottom: 2px;
border-bottom: 1px solid rgba(255,255,255,0.15);
width: 100%;
text-align: center;
}

.micro-excel-btn {
width: 100%;
justify-content: center;
}

th{
font-size:11px;
padding:5px 6px;
}

td{
font-size:11px;
padding:4px 6px;
}

table{
min-width:1400px;
}

}

</style>

</head>

<body>

<div class="header-box">

<h1>MGIT Placement Records</h1>

<h3>Academic Year 2025 - 2026</h3>

</div>

<div class="stats">

<div>
Total Offers :
<span id="totalOffers">0</span>
</div>

<div>
Total Placed Students :
<span id="placedStudents">0</span>
</div>

</div>

<div class="controls">

<input type="text" id="search" placeholder="Search student / roll / company">

<select id="batchFilter"><option value="">All Batches</option></select>
<select id="branchFilter"><option value="">All Branches</option></select>
<select id="companyFilter"><option value="">All Companies</option></select>
<select id="natureFilter"><option value="">Nature of the Company</option></select>
<select id="internFilter"><option value="">Internship Type</option></select>
<select id="genderFilter"><option value="">All Genders</option></select>

</div>

<div class="action-container">
    <div class="salary-filters-row">
        <input type="number" id="minSalary" step="any" placeholder="Min Salary (>=)">
        <input type="number" id="maxSalary" step="any" placeholder="Max Salary (<=)">
    </div>
    
    <button id="singlePlacementsCard" class="clickable-metrics-card">
        <div class="card-title-text">Click here Single Placements</div>
        <div class="card-stat-item">Offers:<span id="cardOffers">0</span></div>
        <div class="card-stat-item">Placed:<span id="cardPlaced">0</span></div>
    </button>
    
    <button id="exportExcelBtn" class="micro-excel-btn">📥 Excel</button>
</div>

<div class="table-container">

<table id="placementTable">

<thead></thead>

<tbody></tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>

/* CSV URL */

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlQ0WjFcZaI2eiKVtAqynVqs3H82MznXaV15n-qLjsDv6QL75g_7sQAhm0n6ZtiiDVKIB0MkuTNQ64/pub?gid=492329818&single=true&output=csv";

let allData=[];
let currentFilteredData=[];

let natureKey="";
let internKey="";
let salaryKey=""; 

/* LOAD CSV */

Papa.parse(csvURL,{

download:true,

header:true,

skipEmptyLines:true,

complete:function(results){

allData = results.data.filter(
row => Object.values(row).join("").trim() !== ""
);

if(allData.length===0){

alert("No Data Found");

return;

}

let headers = Object.keys(allData[0]);

natureKey = headers.find(
h => h.toLowerCase().includes("nature")
);

internKey = headers.find(
h => h.toLowerCase().includes("paid")
);

salaryKey = headers.find(
h => h.toLowerCase().includes("salary") || h.toLowerCase().includes("lpa") || h.toLowerCase().includes("package")
);

currentFilteredData = [...allData];

buildTable(allData);

populateFilters(allData);

updateStats(allData);

},

error:function(err){

console.log(err);

alert("CSV Loading Failed");

}

});

/* BUILD TABLE */

function buildTable(data){

let thead=document.querySelector("#placementTable thead");

let tbody=document.querySelector("#placementTable tbody");

thead.innerHTML="";

tbody.innerHTML="";

if(data.length===0){

tbody.innerHTML=
"<tr><td colspan='20'>No Records Found</td></tr>";

return;

}

let headers=Object.keys(data[0]);

let tr=document.createElement("tr");

/* HEADERS */

headers.forEach(h=>{

let th=document.createElement("th");

th.innerText=h;

tr.appendChild(th);

});

thead.appendChild(tr);

/* ROWS */

data.forEach(row=>{

let tr=document.createElement("tr");

headers.forEach(h=>{

let td=document.createElement("td");

let value = row[h] ? row[h].toString().trim() : "";

if(value.includes("http")){

let a=document.createElement("a");

a.href=value;

a.target="_blank";

a.className="link-btn";

if(h.toLowerCase().includes("intern")){

a.innerText="📄 Internship Letter";

}

else if(h.toLowerCase().includes("offer")){

a.innerText="📄 Offer Letter";

}

else{

a.innerText="📄 View";

}

td.appendChild(a);

}

else{

td.innerText=value;

}

tr.appendChild(td);

});

tbody.appendChild(tr);

});

}

/* POPULATE FILTERS */

function populateFilters(data){

let batches=[
...new Set(data.map(d=>d["Batch"]).filter(Boolean))
];

let branches=[
...new Set(data.map(d=>d["Branch"]).filter(Boolean))
];

let companies=[
...new Set(data.map(d=>d["Company Placed"]).filter(Boolean))
];

let natures=[
...new Set(
data.map(d => (d[natureKey] || "").trim())
.filter(v=>v)
)
];

let interns=[
...new Set(
data.map(d => (d[internKey] || "").trim())
.filter(v=>v)
)
];

let genders=[
...new Set(
data.map(d => (d["Gender"] || "").trim())
.filter(v=>v)
)
];

/* SELECTS */

let batchSelect=document.getElementById("batchFilter");

let branchSelect=document.getElementById("branchFilter");

let companySelect=document.getElementById("companyFilter");

let natureSelect=document.getElementById("natureFilter");

let internSelect=document.getElementById("internFilter");

let genderSelect=document.getElementById("genderFilter");

/* RESET */

batchSelect.innerHTML='<option value="">All Batches</option>';

branchSelect.innerHTML='<option value="">All Branches</option>';

companySelect.innerHTML='<option value="">All Companies</option>';

natureSelect.innerHTML='<option value="">Nature of the Company</option>';

internSelect.innerHTML='<option value="">Internship Type</option>';

genderSelect.innerHTML='<option value="">All Genders</option>';

/* ADD OPTIONS */

batches.sort().forEach(v=>
batchSelect.add(new Option(v,v))
);

branches.sort().forEach(v=>
branchSelect.add(new Option(v,v))
);

companies.sort().forEach(v=>
companySelect.add(new Option(v,v))
);

natures.sort().forEach(v=>
natureSelect.add(new Option(v,v))
);

interns.sort().forEach(v=>
internSelect.add(new Option(v,v))
);

genders.sort().forEach(v=>
genderSelect.add(new Option(v,v))
);

}

function updateCompanyFilter(filteredData){

let companySelect =
document.getElementById("companyFilter");

/* CURRENT SELECTION */

let currentValue = companySelect.value;

/* UNIQUE COMPANIES */

let companies = [
...new Set(
filteredData
.map(d => d["Company Placed"])
.filter(Boolean)
)
];

/* RESET */

companySelect.innerHTML =
'<option value="">All Companies</option>';

/* ADD FILTERED OPTIONS */

companies.sort().forEach(v =>
companySelect.add(new Option(v,v))
);

/* RESTORE VALUE IF EXISTS */

if(companies.includes(currentValue)){

companySelect.value = currentValue;

}

}

/* UPDATE STATS */

function updateStats(data){

document.getElementById("totalOffers").innerText=allData.length;

let uniqueStudentsGlobal=new Set();
allData.forEach(row=>{
uniqueStudentsGlobal.add(row["Roll Number"]);
});
document.getElementById("placedStudents").innerText=uniqueStudentsGlobal.size;

// Live synchronization updates to the card layout parameters
document.getElementById("cardOffers").innerText=data.length;

let uniqueStudentsCard=new Set();
data.forEach(row=>{
if(row["Roll Number"]) {
  uniqueStudentsCard.add(row["Roll Number"]);
}
});
document.getElementById("cardPlaced").innerText=uniqueStudentsCard.size;

}

/* APPLY FILTERS */

function applyFilters(){

let search=document.getElementById("search")
.value.toLowerCase();

let minSalaryVal = parseFloat(document.getElementById("minSalary").value);
let maxSalaryVal = parseFloat(document.getElementById("maxSalary").value);

let batch=document.getElementById("batchFilter").value;

let branch=document.getElementById("branchFilter").value;

let company=document.getElementById("companyFilter").value;

let nature=document.getElementById("natureFilter").value;

let intern=document.getElementById("internFilter").value;

let gender=document.getElementById("genderFilter").value;

/* FILTER */

let filtered=allData.filter(row=>{

let text=JSON.stringify(row).toLowerCase();

let currentSalaryNum = NaN;
if(salaryKey && row[salaryKey]) {
  let cleanedStr = row[salaryKey].toString().replace(/[^0-9.]/g, '');
  if(cleanedStr.trim() !== "") {
    currentSalaryNum = parseFloat(cleanedStr);
  }
}

let fulfillsMinBound = isNaN(minSalaryVal) || (!isNaN(currentSalaryNum) && currentSalaryNum >= minSalaryVal);
let fulfillsMaxBound = isNaN(maxSalaryVal) || (!isNaN(currentSalaryNum) && currentSalaryNum <= maxSalaryVal);

return text.includes(search)

&& fulfillsMinBound
&& fulfillsMaxBound

&& (batch==="" || row["Batch"]===batch)

&& (branch==="" || row["Branch"]===branch)

&& (company==="" || row["Company Placed"]===company)

&& (nature==="" ||
(row[natureKey] || "").trim()===nature)

&& (intern==="" ||
(row[internKey] || "").trim()===intern)

&& (gender==="" ||
(row["Gender"] || "").trim()===gender);

});

currentFilteredData = filtered; 

updateCompanyFilter(filtered);
  
buildTable(filtered);

updateStats(filtered);

}

/* EXCEL DOWNLOAD CONTROLLER */
function handleExcelExport() {
  if (!currentFilteredData || currentFilteredData.length === 0) {
    alert("No active records available to download!");
    return;
  }
  
  let headers = Object.keys(currentFilteredData[0]);
  let outputCSV = "\uFEFF"; 
  
  outputCSV += headers.map(h => `"${h.replace(/"/g, '""')}"`).join(",") + "\r\n";
  
  currentFilteredData.forEach(row => {
    let rowLine = headers.map(h => {
      let value = row[h] ? row[h].toString().trim() : "";
      return `"${value.replace(/"/g, '""')}"`;
    });
    outputCSV += rowLine.join(",") + "\r\n";
  });
  
  let binaryBlob = new Blob([outputCSV], { type: "text/csv;charset=utf-8;" });
  let virtualAnchor = document.createElement("a");
  let objectURL = URL.createObjectURL(binaryBlob);
  
  virtualAnchor.setAttribute("href", objectURL);
  virtualAnchor.setAttribute("download", "MGIT_Filtered_Placements.csv");
  virtualAnchor.style.visibility = "hidden";
  document.body.appendChild(virtualAnchor);
  virtualAnchor.click();
  document.body.removeChild(virtualAnchor);
}

/* CARDS ACTION INTERACTION FUNCTION LAYER */
function triggerSinglePlacementsAction() {
  // Pull out students who only hold a single unique placement offer across your dataset records
  let studentOfferCounts = {};
  
  allData.forEach(row => {
    let roll = row["Roll Number"];
    if(roll) {
      studentOfferCounts[roll] = (studentOfferCounts[roll] || 0) + 1;
    }
  });

  let singlePlacedData = allData.filter(row => {
    let roll = row["Roll Number"];
    return roll && studentOfferCounts[roll] === 1;
  });

  // Rebuild components using extracted single placement datasets
  currentFilteredData = singlePlacedData;
  buildTable(singlePlacedData);
  
  // Update live statistics counters within card grid spaces
  document.getElementById("cardOffers").innerText = singlePlacedData.length;
  document.getElementById("cardPlaced").innerText = singlePlacedData.length;
}

/* EVENTS */

document.getElementById("search")
.addEventListener("keyup",applyFilters);

document.getElementById("minSalary")
.addEventListener("input",applyFilters);

document.getElementById("maxSalary")
.addEventListener("input",applyFilters);

document.getElementById("batchFilter")
.addEventListener("change",applyFilters);

document.getElementById("branchFilter")
.addEventListener("change",applyFilters);

document.getElementById("companyFilter")
.addEventListener("change",applyFilters);

document.getElementById("natureFilter")
.addEventListener("change",applyFilters);

document.getElementById("internFilter")
.addEventListener("change",applyFilters);

document.getElementById("genderFilter")
.addEventListener("change",applyFilters);

document.getElementById("exportExcelBtn")
.addEventListener("click", handleExcelExport);

// Hook the interactive action script routing to the clickable mini analytics card
document.getElementById("singlePlacementsCard")
.addEventListener("click", triggerSinglePlacementsAction);

</script>

</body>
</html>
