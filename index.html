<!DOCTYPE html>
<html>
<head>

<title>MGIT Placement Records</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:10px;
}

h1{
text-align:center;
font-size:22px;
}

#search{
padding:7px;
margin-bottom:10px;
width:300px;
font-size:14px;
}

.table-container{
overflow-x:auto;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ccc;
padding:6px;
font-size:12px;
text-align:center;
white-space:nowrap;
}

th{
background:#2c3e50;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}

</style>

</head>

<body>

<h1>MGIT Placement Records</h1>

<input type="text" id="search" placeholder="Search Name / Roll Number / Company">

<div class="table-container">

<table id="placementTable">
<thead></thead>
<tbody></tbody>
</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTUe0uxH1vxKCjsJsl45S2ggaF5i3gMocFZdxiSYiUviGM9_BGBC4Dl2PtSe3ucs30WL7qV-NRBS9Vi/pub?gid=539822730&single=true&output=csv";

let tableBody;

Papa.parse(csvURL, {
download: true,
header: true,
complete: function(results) {

let data = results.data;

let tableHead=document.querySelector("#placementTable thead");
tableBody=document.querySelector("#placementTable tbody");

let headers=Object.keys(data[0]);

let tr=document.createElement("tr");

headers.forEach(h=>{
let th=document.createElement("th");
th.innerText=h;
tr.appendChild(th);
});

tableHead.appendChild(tr);

data.forEach(row=>{

let tr=document.createElement("tr");

headers.forEach(h=>{
let td=document.createElement("td");
td.innerText=row[h];
tr.appendChild(td);
});

tableBody.appendChild(tr);

});

}

});

document.getElementById("search").addEventListener("keyup",function(){

let filter=this.value.toLowerCase();
let rows=document.querySelectorAll("#placementTable tbody tr");

rows.forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(filter)?"":"none";
});

});

</script>

</body>
</html>
